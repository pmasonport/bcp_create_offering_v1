// WIZARD
// ═══════════════════════════════════════════════════════════════

function renderWizard() {
  const s = createState;
  const stepNames = ['Basics', 'Pricing', 'Features & Review'];

  let h = `
    <button class="back" onclick="goBackFromWizard()">← Back</button>
    <h1 class="page-title">${s.isAddon ? 'New add-on' : 'New offering'}${s.duplicateFrom ? ` <span style="font-size:13px;font-weight:400;color:var(--g400)">(from ${s.duplicateFrom.name})</span>` : ''}</h1>
    <div class="wizard-stepper">`;

  stepNames.forEach((name, i) => {
    const num = i + 1;
    const cls = num < s.wizardStep ? 'done' : num === s.wizardStep ? 'active' : 'pending';
    const lineCls = num < s.wizardStep ? 'done' : '';
    h += `<div class="wizard-step-item">
      <span class="wizard-step-num ${cls}">${num < s.wizardStep ? '✓' : num}</span>
      <span class="wizard-step-label ${cls}">${name}</span>
    </div>`;
    if (i < 2) h += `<div class="wizard-step-line ${lineCls}"></div>`;
  });
  h += `</div>`;

  if (s.wizardStep === 1) h += renderWizardStep1();
  else if (s.wizardStep === 2) h += renderWizardStep2();
  else if (s.wizardStep === 3) h += renderWizardStep3();

  return h;
}

function renderWizardStep1() {
  const s = createState;
  const hasGroup = s.workspaceGroupId || s.isNewGroup;
  let h = `<div class="wizard-step fade-in">
    <div class="form-group" style="margin-top:0">
      <label class="form-label">Offering group</label>
      <select class="form-select" onchange="handleGroupChange(this.value)">
        ${!hasGroup ? '<option value="">Choose a group…</option>' : ''}
        ${GROUPS.map(g => `<option value="${g.id}" ${s.workspaceGroupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('')}
        <option value="__new" ${s.isNewGroup ? 'selected' : ''}>+ Create new offering group</option>
      </select>
      ${s.isNewGroup ? `
      <div style="margin-top:8px;padding:12px 14px;border:1px solid var(--g100);border-radius:4px;background:var(--g50)">
        <label class="form-label" style="font-size:12px">New offering group name</label>
        <input class="form-input" placeholder="e.g. Docker Offload" value="${s.groupName}" oninput="createState.groupName=this.value; createState.groupSlug=slugify(this.value);" />
      </div>` : ''}
    </div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" placeholder="${s.isAddon ? 'e.g. ELS (Per-Repo)' : 'e.g. DHI — Enterprise (Per-Repo)'}" value="${s.offName}" oninput="createState.offName=this.value; if(!createState._offSlugEdited){ createState.offSlug=slugify(this.value); } var b=document.getElementById('wizard-s1-btn'); if(b) b.disabled=!(this.value && (createState.workspaceGroupId || createState.isNewGroup));" />
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
      <div>
        <label class="form-label">Which type of accounts can buy this?</label>
        <select class="form-select" onchange="createState.offAcct=this.value;">
          <option value="user" ${s.offAcct==='user'?'selected':''}>Users</option>
          <option value="organization" ${s.offAcct==='organization'?'selected':''}>Organizations</option>
          <option value="both" ${s.offAcct==='both'?'selected':''}>Both (Users & Organizations)</option>
        </select>
      </div>
      <div>
        <label class="form-label">Sales channel</label>
        <select class="form-select" onchange="createState.offChannel=this.value;">
          <option value="both" ${s.offChannel==='both'?'selected':''}>Both (Self-serve & Sales-led)</option>
          <option value="self-serve" ${s.offChannel==='self-serve'?'selected':''}>Self-serve only</option>
          <option value="sales-led" ${s.offChannel==='sales-led'?'selected':''}>Sales-led only</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description <span class="form-hint">optional</span></label>
      <textarea class="form-textarea" placeholder="Describe this offering" oninput="createState.offDesc=this.value">${s.offDesc}</textarea>
    </div>`;

  if (s.isAddon) {
    h += `<div class="form-group">
      <label class="form-label">Dependency</label>
      <div class="dep-picker">
        <div class="radio-group">
          <div class="radio-option ${s.offDep==='group'?'selected':''}" onclick="createState.offDep='group'; render(true);">
            <div class="radio-dot"></div>
            <div><div class="radio-label">Any offering in this group</div>
            <div class="radio-desc">Requires any ${s.groupName} offering</div></div>
          </div>
          <div class="radio-option ${s.offDep==='specific'?'selected':''}" onclick="createState.offDep='specific'; render(true);">
            <div class="radio-dot"></div>
            <div><div class="radio-label">Specific offerings in this group</div>
            <div class="radio-desc">Pick which offerings this add-on can attach to</div></div>
          </div>
          <div class="radio-option ${s.offDep==='other'?'selected':''}" onclick="createState.offDep='other'; render(true);">
            <div class="radio-dot"></div>
            <div><div class="radio-label">An offering in a different group</div>
            <div class="radio-desc">This add-on depends on offerings outside this group</div></div>
          </div>
        </div>
        ${s.offDep === 'specific' ? `
        <div class="form-group" style="margin-top:12px">
          <select class="form-select" onchange="createState.offDepTarget=this.value; render(true);">
            <option value="">Select offering…</option>
            ${s.wsOfferings.filter(o=>!o.isAddon).map(o=>`<option value="${o.name}" ${s.offDepTarget===o.name?'selected':''}>${o.name}</option>`).join('')}
          </select>
          ${s.offDepTarget ? `<div style="margin-top:6px"><span class="badge badge-account">${s.offDepTarget}</span></div>` : ''}
        </div>` : ''}
        ${s.offDep === 'other' ? `
        <div class="form-group" style="margin-top:12px">
          <select class="form-select" onchange="createState.offDepTarget=this.value; render(true);">
            <option value="">Select offering group…</option>
            ${GROUPS.map(g=>`<option value="${g.name}" ${s.offDepTarget===g.name?'selected':''}>${g.name}</option>`).join('')}
          </select>
        </div>` : ''}
      </div>
    </div>`;
  }

  const canContinue = s.offName && (s.workspaceGroupId || s.isNewGroup);
  h += `<div class="btn-row">
    <button class="btn-secondary" onclick="goBackFromWizard()">Cancel</button>
    <button id="wizard-s1-btn" class="btn-primary" ${canContinue ? '' : 'disabled'} onclick="createState.wizardStep=2; render(true);">Continue →</button>
  </div></div>`;
  return h;
}

function renderWizardStep2() {
  const s = createState;
  const groupName = s.isNewGroup ? s.groupName : (GROUPS.find(g=>g.id===s.workspaceGroupId)?.short || s.groupName);
  let h = `<div class="wizard-step-collapsed" onclick="createState.wizardStep=1; render(true);">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="wizard-step-num done">✓</span>
      <strong>${s.offName}</strong>
      <span style="color:var(--g300)">·</span>
      <span style="color:var(--g400);font-size:13px">${groupName}</span>
      <span style="color:var(--g300)">·</span>
      <span style="color:var(--g400);font-size:13px">${s.offAcct}</span>
    </div>
    <span style="font-size:12px;color:var(--blue);cursor:pointer">Edit</span>
  </div>
  <div class="wizard-step fade-in" style="margin-top:8px">`;

  // Saved rate cards summary
  if (s.rateCards.length > 0) {
    h += `<div style="margin-bottom:16px">`;
    s.rateCards.forEach((rc, i) => {
      h += `<div class="rc-card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div>
          <div style="font-size:13px;font-weight:500;color:var(--g900)">${rc.label}</div>
          <div style="font-size:12px;color:var(--g400);margin-top:2px">${rc.strategy} · ${rc.model} · ${rc.cycle}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="mono" style="font-size:13px;font-weight:600">${rc.price}</span>
          <button style="border:none;background:none;color:var(--red);cursor:pointer;font-size:12px" onclick="createState.rateCards.splice(${i},1); render(true);">Remove</button>
        </div>
      </div>`;
    });
    h += `</div>`;
  }

  // Free or paid
  h += `<div class="form-group" style="margin-top:0">
    <label class="form-label">Is this offering free or paid?</label>
    <div class="select-card-grid">
      <div class="select-card ${s.offFreeOrPaid==='free'?'selected':''}" onclick="createState.offFreeOrPaid='free'; createState.offMon='subscription'; createState.offPrice='$0'; createState.offPricingModel='fixed'; render(true);" style="padding:14px">
        <div class="select-card-title">Free</div>
        <div class="select-card-desc">No charge to the customer</div>
      </div>
      <div class="select-card ${s.offFreeOrPaid==='paid'?'selected':''}" onclick="createState.offFreeOrPaid='paid'; createState.offPrice=''; render(true);" style="padding:14px">
        <div class="select-card-title">Paid</div>
        <div class="select-card-desc">Customers pay to access this</div>
      </div>
    </div>
  </div>`;

  if (s.offFreeOrPaid === 'paid') {
    // Strategy
    h += `<div class="form-group fade-in">
      <label class="form-label">Monetization strategy</label>
      <select class="form-select" onchange="createState.offMon=this.value; createState.rcFeature=''; createState.rcMeter=''; createState.rcResource=''; createState.offPricingModel=''; createState.offPrice=''; createState.offAnnualPrice=''; createState.rcBatchPrices={}; createState.rcTiers=[{from:'0',to:'1000',perUnit:'0',fixed:'0'},{from:'1001',to:'∞',perUnit:'',fixed:'0'}]; render(true);">
        <option value="">Choose how customers pay…</option>
        <option value="subscription" ${s.offMon==='subscription'?'selected':''}>Recurring subscription — charged monthly, annually, or both</option>
        <option value="payg" ${s.offMon==='payg'?'selected':''}>Pay-as-you-go — charged based on actual usage</option>
        <option value="prepaid" ${s.offMon==='prepaid'?'selected':''}>Prepaid — customer buys blocks upfront</option>
        <option value="one_time" ${s.offMon==='one_time'?'selected':''}>One-time payment — single charge</option>
      </select>
    </div>`;

    // === SUBSCRIPTION ===
    if (s.offMon === 'subscription') {
      const feats = getMutableAndMeteredFeatures();
      const selFeat = feats.find(f => f.slug === s.rcFeature);
      const resources = selFeat ? getResourcesForFeature(selFeat.slug) : [];

      h += `<div class="form-group fade-in">
        <label class="form-label">What is being charged for?</label>
        <select class="form-select" onchange="createState.rcFeature=this.value; createState.rcResource=''; render(true);">
          <option value="">Offering as a whole (flat fee)</option>`;
      let lastSvc = '';
      feats.forEach(f => {
        if (f.svcName !== lastSvc) { if (lastSvc) h += `</optgroup>`; h += `<optgroup label="${f.svcName}">`; lastSvc = f.svcName; }
        h += `<option value="${f.slug}" ${s.rcFeature===f.slug?'selected':''}>${f.name}${f.mutable?' (mutable)':''}${f.metering&&f.metering!=='static'?' ('+f.metering+')':''}</option>`;
      });
      if (lastSvc) h += `</optgroup>`;
      h += `</select></div>`;

      if (resources.length > 0) {
        h += `<div class="form-group fade-in">
          <label class="form-label">Which resource?</label>
          <select class="form-select" onchange="createState.rcResource=this.value;">
            <option value="">Select resource…</option>
            ${resources.map(r => `<option value="${r.id}" ${s.rcResource===r.id?'selected':''}>${r.name} — ${r.desc}</option>`).join('')}
          </select></div>`;
      }

      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px" class="fade-in">
        <div>
          <label class="form-label">Pricing model</label>
          <select class="form-select" onchange="createState.offPricingModel=this.value; render(true);">
            <option value="fixed" ${s.offPricingModel==='fixed'?'selected':''}>Fixed amount</option>
            <option value="per_unit" ${s.offPricingModel==='per_unit'?'selected':''}>Per unit (e.g. per seat)</option>
          </select>
        </div>
        <div>
          <label class="form-label">Billing period</label>
          <select class="form-select" onchange="createState.offBillingCycle=this.value; render(true);">
            <option value="both" ${s.offBillingCycle==='both'?'selected':''}>Monthly & annual</option>
            <option value="monthly" ${s.offBillingCycle==='monthly'?'selected':''}>Monthly only</option>
            <option value="annual" ${s.offBillingCycle==='annual'?'selected':''}>Annual only</option>
          </select>
        </div>
      </div>`;

      if (s.offBillingCycle === 'both') {
        h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px" class="fade-in">
          <div><label class="form-label">Monthly price</label>
            <input class="form-input mono" placeholder="e.g. $20/seat" value="${s.offPrice}" oninput="createState.offPrice=this.value; updateS2Btn();" /></div>
          <div><label class="form-label">Annual price</label>
            <input class="form-input mono" placeholder="e.g. $180/seat" value="${s.offAnnualPrice}" oninput="createState.offAnnualPrice=this.value; updateS2Btn();" /></div>
        </div>`;
      } else {
        h += `<div class="form-group fade-in">
          <label class="form-label">${s.offBillingCycle === 'annual' ? 'Annual' : 'Monthly'} price</label>
          <input class="form-input mono" placeholder="e.g. $20/seat" value="${s.offPrice}" oninput="createState.offPrice=this.value; updateS2Btn();" />
        </div>`;
      }

      h += `<div class="form-group fade-in">
        <label class="form-label">Billing timing</label>
        <select class="form-select"><option selected>In advance</option><option>In arrears</option></select>
      </div>`;
    }

    // === PAYG ===
    if (s.offMon === 'payg') {
      const selMeter = METERS.find(m => m.id === s.rcMeter);
      const resources = selMeter ? getResourcesForMeter(selMeter.id) : [];

      h += `<div class="form-group fade-in">
        <label class="form-label">Which meter?</label>
        <select class="form-select" onchange="createState.rcMeter=this.value; createState.rcResource=''; createState.rcBatchPrices={}; render(true);">
          <option value="">Select meter…</option>
          ${METERS.map(m => `<option value="${m.id}" ${s.rcMeter===m.id?'selected':''}>${m.name} (${m.unit}) — ${m.service}</option>`).join('')}
        </select></div>`;

      if (selMeter) {
        h += `<div class="form-group fade-in">
          <label class="form-label">Pricing model</label>
          <div class="select-card-grid">
            ${['per_unit','block','graduated','volume'].map(model => {
              const icons = {per_unit:[16,16,16,16,16],block:[14,14,22,22],graduated:[8,14,20,26],volume:[12,12,20,20]};
              const labels = {per_unit:'Per unit',block:'Block',graduated:'Graduated',volume:'Volume'};
              const descs = {per_unit:'Same price for every unit',block:'Fixed price per chunk',graduated:'Each unit priced by tier',volume:'All units at highest tier'};
              const bars = icons[model].map((h,i) => {
                let c = s.offPricingModel===model ? (model==='graduated'?['var(--blue)','#60A5FA','#93C5FD','#BFDBFE'][i]:'var(--blue)') : 'var(--g300)';
                return `<div style="width:${model==='per_unit'?6:8}px;height:${h}px;background:${c};border-radius:1px"></div>`;
              }).join('');
              return `<div class="select-card ${s.offPricingModel===model?'selected':''}" onclick="createState.offPricingModel='${model}'; render(true);" style="padding:12px">
                <div style="display:flex;gap:${model==='per_unit'?2:3}px;align-items:flex-end;margin-bottom:6px">${bars}</div>
                <div class="select-card-title" style="font-size:12px">${labels[model]}</div>
                <div class="select-card-desc" style="font-size:11px">${descs[model]}</div>
              </div>`;
            }).join('')}
          </div></div>`;

        // PAYG pricing inputs
        if (s.offPricingModel === 'per_unit' || s.offPricingModel === 'block') {
          // Batch resource pricing
          if (resources.length > 0) {
            h += `<div class="form-group fade-in">
              <label class="form-label">${s.offPricingModel === 'block' ? 'Block pricing per resource' : 'Price per resource'}</label>
              <div class="svc-card"><table class="feat-table"><thead><tr>
                <th>Resource</th>
                ${s.offPricingModel === 'block' ? '<th style="width:100px;text-align:right">Block size</th>' : ''}
                <th style="width:160px;text-align:right">Price / ${selMeter.unit}</th>
              </tr></thead><tbody>`;
            resources.forEach(r => {
              const val = s.rcBatchPrices[r.id] || '';
              h += `<tr>
                <td><span style="font-weight:500">${r.name}</span><div style="font-size:11px;color:var(--g400)">${r.desc}</div></td>
                ${s.offPricingModel === 'block' ? `<td style="text-align:right"><input class="form-input mono" style="width:80px;display:inline;text-align:right" placeholder="500" /></td>` : ''}
                <td style="text-align:right"><input class="form-input mono" style="width:120px;display:inline;text-align:right" placeholder="${s.offPricingModel==='block'?'$25':'$0.035'}" value="${val}" oninput="createState.rcBatchPrices['${r.id}']=this.value; updateS2Btn();" /></td>
              </tr>`;
            });
            h += `</tbody></table></div>
              <div style="font-size:11px;color:var(--g400);margin-top:4px">Leave price empty to skip a resource. Billing: monthly · in arrears.</div>
            </div>`;
          } else {
            h += `<div class="form-group fade-in">
              <label class="form-label">Price</label>
              <input class="form-input mono" placeholder="${s.offPricingModel==='block'?'e.g. $25/500-min':'e.g. $0.035/hr'}" value="${s.offPrice}" oninput="createState.offPrice=this.value; updateS2Btn();" />
            </div>`;
          }
        }

        if (s.offPricingModel === 'graduated' || s.offPricingModel === 'volume') {
          h += `<div class="form-group fade-in">
            <label class="form-label">${s.offPricingModel === 'graduated' ? 'Graduated' : 'Volume'} tier pricing</label>
            <div class="svc-card"><table class="feat-table"><thead><tr>
              <th style="width:100px">From</th>
              <th style="width:100px">To</th>
              <th style="width:120px;text-align:right">Per unit ($)</th>
              <th style="width:120px;text-align:right">Fixed ($)</th>
              <th style="width:40px"></th>
            </tr></thead><tbody>`;
          s.rcTiers.forEach((t, i) => {
            h += `<tr>
              <td><input class="form-input mono" style="width:80px" value="${t.from}" oninput="createState.rcTiers[${i}].from=this.value;" /></td>
              <td><input class="form-input mono" style="width:80px" value="${t.to}" oninput="createState.rcTiers[${i}].to=this.value;" /></td>
              <td style="text-align:right"><input class="form-input mono" style="width:100px;text-align:right" placeholder="0.00" value="${t.perUnit}" oninput="createState.rcTiers[${i}].perUnit=this.value; updateS2Btn();" /></td>
              <td style="text-align:right"><input class="form-input mono" style="width:100px;text-align:right" placeholder="0.00" value="${t.fixed}" oninput="createState.rcTiers[${i}].fixed=this.value;" /></td>
              <td>${i > 0 ? `<button style="border:none;background:none;color:var(--red);cursor:pointer;font-size:16px" onclick="createState.rcTiers.splice(${i},1); render(true);">×</button>` : ''}</td>
            </tr>`;
          });
          h += `</tbody></table></div>
            <button class="btn-secondary" style="margin-top:6px;padding:6px 12px;font-size:12px" onclick="createState.rcTiers.push({from:'',to:'∞',perUnit:'',fixed:'0'}); render(true);">+ Add tier</button>
            <div style="font-size:11px;color:var(--g400);margin-top:8px">Billing: monthly · in arrears. ${s.offPricingModel==='graduated' ? 'Each unit priced by the tier it falls into.' : 'All units priced at the highest achieved tier.'}</div>
          </div>`;
        }
      }
    }

    // === PREPAID ===
    if (s.offMon === 'prepaid') {
      const feats = getMutableAndMeteredFeatures();
      const selFeat = feats.find(f => f.slug === s.rcFeature);
      const resources = selFeat ? getResourcesForFeature(selFeat.slug) : [];

      h += `<div class="form-group fade-in">
        <label class="form-label">What is being sold?</label>
        <select class="form-select" onchange="createState.rcFeature=this.value; createState.rcResource=''; render(true);">
          <option value="">Select feature…</option>`;
      let lastSvc = '';
      feats.forEach(f => {
        if (f.svcName !== lastSvc) { if (lastSvc) h += `</optgroup>`; h += `<optgroup label="${f.svcName}">`; lastSvc = f.svcName; }
        h += `<option value="${f.slug}" ${s.rcFeature===f.slug?'selected':''}>${f.name}</option>`;
      });
      if (lastSvc) h += `</optgroup>`;
      h += `</select></div>`;

      if (resources.length > 0) {
        h += `<div class="form-group fade-in">
          <label class="form-label">Which resource?</label>
          <select class="form-select" onchange="createState.rcResource=this.value;">
            <option value="">Select resource…</option>
            ${resources.map(r => `<option value="${r.id}" ${s.rcResource===r.id?'selected':''}>${r.name} — ${r.desc}</option>`).join('')}
          </select></div>`;
      }

      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px" class="fade-in">
        <div><label class="form-label">Block size</label>
          <input class="form-input mono" placeholder="e.g. 500 minutes" value="${s.offPrice ? '' : ''}" /></div>
        <div><label class="form-label">Block price</label>
          <input class="form-input mono" placeholder="e.g. $25" value="${s.offPrice}" oninput="createState.offPrice=this.value; updateS2Btn();" /></div>
      </div>
      <div class="form-group fade-in">
        <label class="form-label">Expiration</label>
        <select class="form-select">
          <option selected>End of subscription period</option>
          <option>End of billing period</option>
          <option>Custom (set date)</option>
        </select>
      </div>`;
    }

    // === ONE-TIME ===
    if (s.offMon === 'one_time') {
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px" class="fade-in">
        <div><label class="form-label">Price</label>
          <input class="form-input mono" placeholder="e.g. $500" value="${s.offPrice}" oninput="createState.offPrice=this.value; updateS2Btn();" /></div>
        <div><label class="form-label">Billing timing</label>
          <select class="form-select"><option selected>Immediate</option><option>In advance</option></select></div>
      </div>`;
    }
  }

  // Continue validation
  let canContinue = false;
  if (s.offFreeOrPaid === 'free') canContinue = true;
  else if (s.offMon === 'payg' && (s.offPricingModel === 'graduated' || s.offPricingModel === 'volume')) {
    canContinue = s.rcTiers.some(t => t.perUnit && t.perUnit !== '0');
  } else if (s.offMon === 'payg' && Object.keys(s.rcBatchPrices).length > 0) {
    canContinue = Object.values(s.rcBatchPrices).some(v => v);
  } else if (s.offMon && s.offPrice) canContinue = true;
  if (s.rateCards.length > 0) canContinue = true;

  h += `<div class="btn-row">
    <button class="btn-secondary" onclick="createState.wizardStep=1; render(true);">← Back</button>
    <button id="wizard-s2-btn" class="btn-primary" ${canContinue ? '' : 'disabled'} onclick="createState.wizardStep=3; render(true);">Continue →</button>
  </div></div>`;
  return h;
}

function renderWizardStep3() {
  const s = createState;
  const dupLabel = s.duplicateFrom ? ` (from ${s.duplicateFrom.name})` : '';

  let h = `<div class="wizard-step-collapsed" onclick="createState.wizardStep=1; render(true);">

      <span style="color:var(--g300)">·</span>

  <div class="wizard-step fade-in" style="margin-top:8px">

  h += `<div class="form-group" style="margin-top:12px">

    </div>`;
  });
  h += `</div>`;

  // Review section
  h += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--g200)">
    <div class="section-label" style="margin-top:0">Review</div>
    <div class="rc-card" style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="svc-name">${s.offName || '(untitled)'}</div>
          <div class="svc-slug mono">${s.offSlug || '—'}</div>
          ${s.offDesc ? `<div style="font-size:13px;color:var(--g500);margin-top:4px">${s.offDesc}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div class="mono" style="font-size:13px;font-weight:600">${s.offPrice || '$0'}</div>
          ${s.offAnnualPrice ? `<div style="font-size:11px;color:var(--g400)">${s.offAnnualPrice} annual</div>` : ''}
        </div>
      </div>
      <div class="meta-row" style="margin-top:8px">
        ${pkgBadge(s.isAddon ? 'add_on' : 'standalone')}
        ${monBadge(s.offMon || 'subscription', s.offPrice)}
        ${acctBadge(s.offAcct)}
      </div>
      ${s.isAddon && s.offDepTarget ? `<div class="oc-dep" style="margin-top:6px">requires: ${s.offDepTarget}</div>` : ''}
      ${s.isAddon && s.offDep === 'group' ? `<div class="oc-dep" style="margin-top:6px">requires: any ${s.groupName} offering</div>` : ''}
    </div>
  </div>`;

  h += `<div class="btn-row">
    <button class="btn-secondary" onclick="createState.wizardStep=2; render(true);">← Back</button>
    <button class="btn-secondary" onclick="saveOffering(false)">Save & add another</button>
    <button class="btn-primary" onclick="saveOffering(true)">${createState._launchedFromGroup ? 'Save & return' : 'Save & return to workspace'}</button>
  </div></div>`;
  return h;
}

function saveOffering(returnToWorkspace) {
  const s = createState;
  // Auto-determine package type: add_on if from add-on flow, otherwise standalone
  // (In production, bundle vs standalone would be inferred from service count in Step 3)
  const pkg = s.isAddon ? 'add_on' : 'standalone';
  const newOff = {
    id: 'new-' + Date.now(),
    name: s.offName, slug: s.offSlug, desc: s.offDesc,
    pkg: pkg,
    mon: s.offMon || 'subscription',
    acct: s.offAcct,
    price: s.offPrice || '$0',
    cycle: s.offBillingCycle === 'both' ? 'monthly' : (s.offBillingCycle || '—'),
    altPrice: s.offAnnualPrice || null,
    altCycle: s.offAnnualPrice ? 'annual' : null,
    status: 'draft',
    requires: s.isAddon ? (s.offDepTarget || (s.offDep === 'group' ? 'any ' + s.groupName + ' offering' : '')) : null,
    isAddon: s.isAddon,
  };
  s.wsOfferings.push(newOff);

  if (returnToWorkspace) {
    if (s._launchedFromGroup) {
      // Go back to group detail page
      navigate({view:'group', groupId:s._launchedFromGroup});
      resetCreateState();
    } else {
      navCreate({step:'workspace'});
    }
  } else {
    startWizard(false);
  }
}

  const s = createState;
  return `

      <div class="success-list" style="margin-top:16px">

        ${iconChevron}
      </button>
      <div class="nav-section-body ${catalogsOpen?"":"collapsed"}">
        <button class="nav-sub-item ${page==="offerings"?"active":""}" onclick="navigate({view:'index',groupId:null,offeringId:null,serviceId:null,scope:'all',mode:'list'})">Offerings</button>
        <button class="nav-sub-item ${page==="features"?"active":""}" onclick="navigate({view:'features',groupId:null,offeringId:null,serviceId:null,scope:'all'})">Features</button>
        <button class="nav-sub-item ${page==="meters"?"active":""}" onclick="navigate({view:'meters',groupId:null,offeringId:null,serviceId:null,scope:'all'})">Meters</button>
      </div>
    </div>
    <button class="nav-top-item disabled">
      ${iconReporting}
      Reporting
    </button>`;
}

function toggleCatalogs() {
  catalogsOpen = !catalogsOpen;
  renderSidebar();
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function render(skipSidebar) {
  if (!skipSidebar) renderSidebar();
  const app = document.getElementById("app");
  if (state.view === "create") {
    app.innerHTML = renderCreate();
  } else if (state.view === "index") {
    app.innerHTML = renderIndex();
    if (state.mode === "graph") setTimeout(renderGraph, 10);
  } else if (state.view === "group") {
    app.innerHTML = renderGroupDetail();
  } else if (state.view === "offering") {
    app.innerHTML = renderOfferingDetail();
  } else if (state.view === "features") {
    app.innerHTML = renderFeaturesIndex();
  } else if (state.view === "service") {
    app.innerHTML = renderServiceDetail();
  } else if (state.view === "meters") {
    app.innerHTML = renderMetersIndex();
  }
  if (_shouldScroll) { window.scrollTo(0, 0); _shouldScroll = false; }
}

// Boot
document.addEventListener('click', function(e) {
  if (!e.target.closest('.create-menu-wrap')) closeCreateMenu();
});
render();
</script>
</body>
</html>
